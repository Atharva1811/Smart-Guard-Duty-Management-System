<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Guard Duty System - Security Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .login-bg {
        min-height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
        padding: 1.5rem;
        position: relative;
        overflow: hidden;
      }
      .login-card {
        width: 100%;
        max-width: 440px;
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1rem;
        padding: 2.25rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        color: #f8fafc;
        z-index: 10;
      }
      .blob-1 {
        position: absolute;
        top: 20%;
        left: 20%;
        width: 320px;
        height: 320px;
        background: rgba(59, 130, 246, 0.15);
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
      }
      .blob-2 {
        position: absolute;
        bottom: 20%;
        right: 20%;
        width: 350px;
        height: 350px;
        background: rgba(168, 85, 247, 0.1);
        border-radius: 50%;
        filter: blur(120px);
        pointer-events: none;
      }
      .quick-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        padding: 0.5rem 1rem;
        font-size: 0.75rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .quick-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--primary);
      }
    </style>
  </head>
  <body>
    <div class="login-bg">
      <div class="blob-1"></div>
      <div class="blob-2"></div>

      <!-- Toolbar -->
      <div class="absolute top-6 right-6 flex items-center gap-4 z-20 no-print">
        <button id="lang-btn" class="px-3.5 py-1.5 rounded-lg border border-slate-700 bg-slate-900/60 hover:bg-slate-800 text-xs font-semibold text-white transition-all shadow-md">
          मराठी
        </button>
        <button id="theme-btn" class="p-2 rounded-lg border border-slate-700 bg-slate-900/60 hover:bg-slate-800 text-white transition-all shadow-md" title="Toggle Theme">
          🌙
        </button>
      </div>

      <!-- Main Login Card -->
      <div class="login-card">
        <div class="flex flex-col items-center mb-6 text-center" style="align-items: center;">
          <div style="width: 56px; height: 56px; border-radius: 12px; background: linear-gradient(135deg, #3b82f6, #6366f1); display: flex; align-items: center; justify-content: center; margin-bottom: 0.75rem; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);">
            <svg style="width: 28px; height: 28px; fill: white;" viewBox="0 0 24 24">
              <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 12.2c-2.7 0-5.02-1.37-6.38-3.44.04-1.99 4-3.08 6.38-3.08s6.34 1.09 6.38 3.08c-1.36 2.07-3.68 3.44-6.38 3.44z"/>
            </svg>
          </div>
          <h2 id="login-title" class="text-2xl font-bold tracking-tight" style="color: white; margin-bottom: 0.25rem;">Smart Guard Duty System</h2>
          <p id="login-sub" class="text-xs" style="color: #94a3b8;">Authorized Personnel Security Terminal</p>
        </div>

        <form id="login-form" class="space-y-4" style="margin-top: 1rem;">
          <div id="error-alert" class="hidden p-3 rounded-lg bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs font-medium"></div>

          <div>
            <label id="lbl-username" class="block text-xs font-semibold text-slate-300 mb-1.5 uppercase tracking-wide">Username</label>
            <input type="text" id="username" required placeholder="Enter security officer username" style="background: rgba(15, 23, 42, 0.4); border-color: rgba(255,255,255,0.1); color: white;" />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1.5" style="display: flex; justify-content: space-between;">
              <label id="lbl-password" class="text-xs font-semibold text-slate-300 uppercase tracking-wide">Password</label>
              <a href="#" id="forgot-link" class="text-xs text-primary" style="text-decoration: none;">Forgot Password?</a>
            </div>
            <input type="password" id="passcode" required placeholder="Enter security key passcode" style="background: rgba(15, 23, 42, 0.4); border-color: rgba(255,255,255,0.1); color: white;" />
          </div>

          <div class="flex items-center" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
            <input type="checkbox" id="remember-me" style="width: auto; cursor: pointer;" />
            <label id="lbl-remember" for="remember-me" class="text-xs text-slate-300 cursor-pointer">Remember security profile on this machine</label>
          </div>

          <button type="submit" id="submit-btn" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: #3b82f6; color: white; font-weight: 600; font-size: 0.875rem; margin-top: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            <span id="btn-text">Decrypt Terminal</span>
            <span>&rarr;</span>
          </button>
        </form>

        <div style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
          <p id="quick-label" class="text-xs text-slate-400 mb-2">Quick-login Profiles (Evaluation)</p>
          <div style="display: flex; gap: 0.75rem;">
            <button id="quick-admin" class="quick-btn">
              <span>Admin Profile</span>
            </button>
            <button id="quick-supervisor" class="quick-btn">
              <span>Supervisor Profile</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ES6 Modules Scripts -->
    <script type="module">
      import { api } from './js/api.js';
      import { initTheme, toggleTheme, t } from './js/utils.js';

      // Initialize Theme on startup
      initTheme();

      // UI Element references
      const langBtn = document.getElementById('lang-btn');
      const themeBtn = document.getElementById('theme-btn');
      const loginForm = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passcodeInput = document.getElementById('passcode');
      const rememberCheckbox = document.getElementById('remember-me');
      const errorAlert = document.getElementById('error-alert');
      const submitBtn = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');

      // Quick Profiles
      const quickAdmin = document.getElementById('quick-admin');
      const quickSupervisor = document.getElementById('quick-supervisor');

      // Check if already logged in
      const currentToken = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
      if (currentToken) {
        window.location.href = 'dashboard.html';
      }

      // Handle Theme Switch
      themeBtn.addEventListener('click', () => {
        toggleTheme();
        themeBtn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
      });

      // Handle Language Toggle
      langBtn.addEventListener('click', () => {
        const current = localStorage.getItem('language') || 'en';
        const next = current === 'en' ? 'mr' : 'en';
        localStorage.setItem('language', next);
        renderTranslations();
      });

      // Redraw translated strings on screen
      function renderTranslations() {
        const lang = localStorage.getItem('language') || 'en';
        langBtn.textContent = lang === 'en' ? 'मराठी' : 'English';
        
        document.getElementById('login-title').textContent = t('loginTitle');
        document.getElementById('login-sub').textContent = t('loginSub');
        document.getElementById('lbl-username').textContent = t('username');
        document.getElementById('lbl-password').textContent = t('password');
        document.getElementById('forgot-link').textContent = t('forgotPassword');
        document.getElementById('lbl-remember').textContent = t('rememberMe');
        document.getElementById('btn-text').textContent = t('decryptTerminal');
        document.getElementById('quick-label').textContent = t('quickLogin');
      }

      // Populate initial translations
      renderTranslations();

      // Quick Profiles setup
      quickAdmin.addEventListener('click', () => {
        usernameInput.value = 'admin';
        passcodeInput.value = 'admin123';
      });

      quickSupervisor.addEventListener('click', () => {
        usernameInput.value = 'supervisor';
        passcodeInput.value = 'supervisor123';
      });

      // Form Submission
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const passcode = passcodeInput.value;
        const rememberMe = rememberCheckbox.checked;

        errorAlert.classList.add('hidden');
        btnText.textContent = t('language') === 'mr' ? 'प्रवेश करत आहे...' : 'Decrypting Terminal...';
        submitBtn.disabled = true;

        try {
          const res = await api.login(username, passcode);
          if (res && res.token) {
            // Save Token
            if (rememberMe) {
              localStorage.setItem('auth_token', res.token);
            } else {
              sessionStorage.setItem('auth_token', res.token);
            }
            
            // Redirect
            window.location.href = 'dashboard.html';
          } else {
            errorAlert.textContent = t('invalidCredentials');
            errorAlert.classList.remove('hidden');
            btnText.textContent = t('decryptTerminal');
            submitBtn.disabled = false;
          }
        } catch (err) {
          errorAlert.textContent = err.message || t('unexpectedError');
          errorAlert.classList.remove('hidden');
          btnText.textContent = t('decryptTerminal');
          submitBtn.disabled = false;
        }
      });

      // Forgot password trigger demo
      document.getElementById('forgot-link').addEventListener('click', (e) => {
        e.preventDefault();
        alert(t('language') === 'mr' ? 'कृपया मुख्य सुरक्षा अधिकाऱ्यांशी संपर्क साधा (admin123).' : 'Please contact the system administrator (admin123).');
      });
    </script>
  </body>
</html>
