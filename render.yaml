# render.yaml
services:
  - type: web
    name: sgds-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build --workspace=server
    startCommand: npm start --workspace=server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://atharva1811.github.io/Smart-Guard-Duty-Management-System
